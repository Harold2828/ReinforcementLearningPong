<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Reinforcement Learning Pong Game Project by Harold Ochoa" />
    <meta name="author" content="Harold Ochoa" />
    <link rel="icon" type="image/svg+xml" href="/assets/company/logo.png" />
    <link rel="stylesheet" href="/styles/main.css" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <title>Reinforcement Learning Pong Game</title>
  </head>
  <body>
    <header>
      <div class="logo">
      </div>
      <h1>Reinforcement Learning Pong Game</h1>
    </header>
    <main>
      <aside class="training-panel" aria-label="Training dashboard">
        <div class="status-row">
          <span>Backend</span>
          <strong data-ui="connection-status">Disconnected</strong>
        </div>
        <div class="metrics-grid">
          <div>
            <span>Mode</span>
            <strong data-ui="mode">Manual</strong>
          </div>
          <div>
            <span>Episode</span>
            <strong data-ui="episode">1</strong>
          </div>
          <div>
            <span>Reward</span>
            <strong data-ui="reward">0.00</strong>
          </div>
          <div>
            <span>Epsilon</span>
            <strong data-ui="epsilon">0.000</strong>
          </div>
          <div>
            <span>Score</span>
            <strong data-ui="score">0 - 0</strong>
          </div>
          <div>
            <span>Feedback</span>
            <strong data-ui="feedback">Ready</strong>
          </div>
        </div>
        <div class="control-row">
          <button type="button" data-action="start-training">Start training</button>
          <button type="button" data-action="stop-training">Stop training</button>
          <button type="button" data-action="reset-episode">Reset episode</button>
        </div>
      </aside>
      <section id="game-container" aria-label="Game Container">
        <!-- Game will be rendered here -->
      </section>
    </main>
    <footer>
      <p>Created by <strong>Harold Ochoa</strong></p>
      <p>&copy; 2025 Harold Ochoa. All rights reserved.</p>
    </footer>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
